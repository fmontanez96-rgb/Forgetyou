<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestiario Arcano | Generador de Imágenes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d0b09;
            color: #eaddcf;
            font-family: 'Cormorant Garamond', serif;
        }
        .title-font { font-family: 'Cinzel', serif; }
        .gold-border { border: 2px solid #c5a059; }
        .btn-magic {
            background: linear-gradient(135deg, #6b0000 0%, #8a0303 100%);
            color: #c5a059;
            border: 1px solid #c5a059;
            transition: all 0.3s;
        }
        .btn-magic:hover:not(:disabled) {
            transform: scale(1.02);
            filter: brightness(1.2);
            box-shadow: 0 0 20px rgba(138, 3, 3, 0.5);
        }
        .btn-magic:disabled { opacity: 0.5; }
        #imageResult img {
            box-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 15px rgba(197, 160, 89, 0.3);
        }
        .status-msg { font-size: 0.8rem; color: #c5a059; font-style: italic; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Encabezado -->
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-bold title-font text-[#c5a059] mb-2">Bestiario Arcano</h1>
            <p class="italic opacity-70 italic text-xl">"Transforma tus palabras en visiones de otro mundo"</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Panel de Control -->
            <div class="gold-border p-6 bg-[#151210] rounded-lg">
                <h2 class="title-font text-xl mb-4 border-b border-[#c5a059]/30 pb-2">Invocación</h2>
                
                <div class="mb-4">
                    <label class="block text-xs uppercase tracking-widest text-[#c5a059] mb-1">Estilo Artístico</label>
                    <select id="selTheme" class="w-full bg-[#0a0806] border border-[#c5a059]/40 p-3 rounded text-amber-50">
                        <option value="Gothic dark fantasy oil painting, intricate details, moody lighting">Gótico Oscuro (Óleo)</option>
                        <option value="Ancient mythological parchment illustration, weathered paper, gold leaf accents">Mitológico (Pergamino)</option>
                        <option value="Cinematic epic fantasy, hyper-realistic, vibrant magical energy">Fantasía Épica (Realista)</option>
                        <option value="Surreal dreamlike ethereal atmosphere, soft glowing colors">Etéreo / Sueño</option>
                    </select>
                </div>

                <div class="mb-6">
                    <label class="block text-xs uppercase tracking-widest text-[#c5a059] mb-1">Tu Relato</label>
                    <textarea id="txtStory" rows="6" 
                        class="w-full bg-[#0a0806] border border-[#c5a059]/40 p-4 rounded text-lg italic text-amber-50/90 resize-none focus:border-[#c5a059] outline-none"
                        placeholder="Escribe aquí lo que deseas ver..."></textarea>
                </div>

                <button id="btnGenerate" class="w-full btn-magic py-4 rounded-sm title-font font-bold text-lg shadow-xl uppercase tracking-widest">
                    Generar Imagen
                </button>

                <div id="statusDisplay" class="mt-4 status-msg text-center min-h-[1.2rem]"></div>
            </div>

            <!-- Panel de Resultado -->
            <div class="flex flex-col items-center justify-center">
                <div id="placeholder" class="gold-border w-full aspect-square flex flex-col items-center justify-center bg-[#111] text-[#c5a059]/20 p-8 text-center">
                    <i class="fa-solid fa-wand-sparkles text-6xl mb-4"></i>
                    <p class="title-font">La imagen aparecerá aquí tras la invocación</p>
                </div>
                
                <div id="imageResult" class="hidden w-full">
                    <div class="gold-border overflow-hidden bg-black">
                        <img id="generatedImg" src="" alt="Resultado de la IA" class="w-full h-auto">
                    </div>
                    <p class="mt-4 italic text-center text-[#c5a059]">"El recuerdo ha sido forjado"</p>
                </div>

                <!-- Cargador -->
                <div id="loader" class="hidden flex flex-col items-center">
                    <div class="w-12 h-12 border-4 border-[#c5a059]/20 border-t-[#c5a059] rounded-full animate-spin mb-4"></div>
                    <p class="animate-pulse text-[#c5a059]">Canalizando energía...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- FontAwesome para iconos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración y Llave
        const apiKey = ""; // Inyectada por el entorno
        let db, auth, user;

        // Intentar conectar Firebase silenciosamente
        try {
            const firebaseConfig = JSON.parse(__firebase_config);
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            signInAnonymously(auth).then(cred => user = cred.user);
        } catch (e) {
            console.warn("Firebase no conectado, pero la IA funcionará.");
        }

        const btnGenerate = document.getElementById('btnGenerate');
        const txtStory = document.getElementById('txtStory');
        const statusDisplay = document.getElementById('statusDisplay');
        const imageResult = document.getElementById('imageResult');
        const placeholder = document.getElementById('placeholder');
        const loader = document.getElementById('loader');
        const generatedImg = document.getElementById('generatedImg');

        btnGenerate.addEventListener('click', async () => {
            const story = txtStory.value.trim();
            if (!story) {
                updateStatus("Debes escribir un relato primero.");
                return;
            }

            // UI State
            btnGenerate.disabled = true;
            placeholder.classList.add('hidden');
            imageResult.classList.add('hidden');
            loader.classList.remove('hidden');
            updateStatus("Iniciando conexión con la IA de Google...");

            try {
                const theme = document.getElementById('selTheme').value;
                const finalPrompt = `${theme}. Subject: ${story}. Dark, mystic, highly detailed.`;

                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt: finalPrompt }],
                        parameters: { sampleCount: 1 }
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || "Error en la IA");
                }

                updateStatus("Imagen recibida del éter...");
                const result = await response.json();
                
                if (result.predictions && result.predictions[0]) {
                    const base64Data = result.predictions[0].bytesBase64Encoded;
                    const imgSrc = `data:image/png;base64,${base64Data}`;
                    
                    // MOSTRAR IMAGEN INMEDIATAMENTE
                    generatedImg.src = imgSrc;
                    loader.classList.add('hidden');
                    imageResult.classList.remove('hidden');
                    updateStatus("Invocación completada con éxito.");

                    // Intentar guardar en segundo plano (si falla no importa)
                    if (db && user) {
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'bestiario-app';
                        addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'memories'), {
                            story,
                            img: imgSrc,
                            timestamp: Date.now()
                        }).catch(e => console.log("No se pudo guardar, pero la imagen se generó."));
                    }
                }

            } catch (error) {
                console.error(error);
                updateStatus("Error: " + error.message);
                loader.classList.add('hidden');
                placeholder.classList.remove('hidden');
            } finally {
                btnGenerate.disabled = false;
            }
        });

        function updateStatus(msg) {
            statusDisplay.innerText = msg;
        }
    </script>
</body>
</html>
