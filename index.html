<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colección de Saludos de Doblaje</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7ff;
      --bg-soft: #ffffff;
      --panel: #ffffff;
      --panel-2: #f3f7ff;
      --text: #1f2a44;
      --muted: #556487;
      --line: #c8d3ea;
      --accent: #6a66f6;
      --accent-hover: #5448e8;
      --focus: #11b8cb;
      --ok: #179d6c;
      --ok-soft: #dff9ef;
      --rare-comun: #52617d;
      --rare-raro: #0f8d9e;
      --rare-epico: #7046df;
      --rare-legendario: #8a4b00;
      --shadow: 0 10px 24px rgba(53, 64, 114, .12);
      --shadow-soft: 0 6px 14px rgba(53, 64, 114, .1);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: "Nunito", Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(163, 128, 255, .23), transparent 34%),
        radial-gradient(circle at 92% 18%, rgba(71, 212, 196, .2), transparent 34%),
        radial-gradient(circle at 54% 108%, rgba(255, 147, 133, .22), transparent 40%),
        var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .app {
      width: min(1240px, calc(100% - 32px));
      margin: 28px auto 48px;
      display: grid;
      gap: 22px;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(130deg, rgba(255,255,255,.95), rgba(247,241,255,.98));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .title {
      margin: 0;
      font-size: clamp(1.3rem, 1rem + 1.4vw, 2rem);
      letter-spacing: .2px;
      font-weight: 800;
      color: #26245f;
    }

    .subtitle { margin: 4px 0 0; color: var(--muted); }

    .tabs { display: flex; gap: 10px; flex-wrap: wrap; }

    button, select {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease, background-color .25s ease;
    }

    button:hover, select:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      box-shadow: var(--shadow-soft);
      background: #f8f8ff;
    }
    button:active, select:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(53, 64, 114, .18) inset; }
    button:focus-visible, select:focus-visible { outline: 3px solid color-mix(in srgb, var(--focus) 38%, white); outline-offset: 2px; }
    button.active { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 28%, white); background: #f5f3ff; }

    .view { display: none; }
    .view.active { display: block; animation: fade .25s ease; }

    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: linear-gradient(158deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
    }

    .card:hover { transform: translateY(-3px); border-color: color-mix(in srgb, var(--accent) 58%, white); box-shadow: 0 14px 28px rgba(71, 54, 130, .16); }

    .universe-name { margin: 0 0 8px; font-size: 1.05rem; }
    .muted { color: var(--muted); font-size: .95rem; }

    .universe-layout {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(260px, 1fr);
      gap: 16px;
    }

    .panel, .sidebar {
      background: linear-gradient(160deg, rgba(255,255,255,.95), rgba(244,249,255,.98));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow-soft);
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 14px;
    }

    .toolbar label { display: grid; gap: 6px; font-size: .9rem; color: var(--muted); }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .video-card h3 { margin: 0 0 6px; font-size: 1rem; }
    .video-card p { margin: 0; color: var(--muted); font-size: .92rem; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: .79rem;
      margin-top: 10px;
      border: 1px solid transparent;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .rare-comun { background: rgba(82,97,125,.12); color: var(--rare-comun); border-color: rgba(82,97,125,.35); }
    .rare-raro { background: rgba(15,141,158,.13); color: var(--rare-raro); border-color: rgba(15,141,158,.36); }
    .rare-epico { background: rgba(112,70,223,.13); color: var(--rare-epico); border-color: rgba(112,70,223,.35); }
    .rare-legendario { background: rgba(185,108,0,.14); color: var(--rare-legendario); border-color: rgba(185,108,0,.36); }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

    .player-box {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #eef2fd;
    }

    iframe { width: 100%; aspect-ratio: 16/9; border: 0; display: block; }

    .index-list { display: grid; gap: 8px; max-height: 460px; overflow: auto; }
    .index-row {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,.85);
      transition: border-color .25s ease, transform .25s ease, box-shadow .25s ease;
    }
    .index-row:hover { border-color: color-mix(in srgb, var(--accent) 40%, white); transform: translateY(-1px); box-shadow: var(--shadow-soft); }

    .marathon {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: color-mix(in srgb, var(--focus) 14%, white);
      color: #0e5460;
      border: 1px solid color-mix(in srgb, var(--focus) 42%, white);
      font-size: .9rem;
    }

    details { margin-top: 10px; }
    details summary { cursor: pointer; color: #364164; }
    .version-list { display: grid; gap: 8px; margin-top: 8px; }

    .achievements { display: grid; gap: 10px; }
    .achievement {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,.9);
      box-shadow: var(--shadow-soft);
    }
    .achievement.done { border-color: color-mix(in srgb, var(--ok) 48%, white); background: var(--ok-soft); }

    @media (max-width: 960px) {
      .universe-layout { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <h1 class="title">🎙️ Colección de Saludos de Doblaje</h1>
        <p class="subtitle">Explora universos, personajes, rarezas y desbloquea logros.</p>
      </div>
      <nav class="tabs">
        <button id="tabMap" class="active">Mapa de Universos</button>
        <button id="tabAchievements">Logros</button>
      </nav>
    </header>

    <section id="viewMap" class="view active"></section>
    <section id="viewUniverse" class="view"></section>
    <section id="viewAchievements" class="view"></section>
  </main>

  <script>
    const VIDEOS = [
      { id: 'dbz_goku_1', universo: 'Dragon Ball', personaje: 'Goku', actor_de_doblaje: 'Mario Castañeda', url_video: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ', rareza: 'Legendario', version: 'Versión clásica' },
      { id: 'dbz_goku_2', universo: 'Dragon Ball', personaje: 'Goku', actor_de_doblaje: 'Mario Castañeda', url_video: 'https://www.youtube.com/watch?v=3JZ_D3ELwOQ', rareza: 'Épico', version: 'Versión energética' },
      { id: 'dbz_vegeta_1', universo: 'Dragon Ball', personaje: 'Vegeta', actor_de_doblaje: 'René García', url_video: 'https://www.youtube.com/watch?v=l482T0yNkeo', rareza: 'Raro', version: 'Versión orgullosa' },
      { id: 'dbz_gohan_1', universo: 'Dragon Ball', personaje: 'Gohan', actor_de_doblaje: 'Luis Alfonso Mendoza', url_video: 'https://www.youtube.com/watch?v=9bZkp7q19f0', rareza: 'Común', version: 'Versión amable' },
      { id: 'dis_mickey_1', universo: 'Disney', personaje: 'Mickey Mouse', actor_de_doblaje: 'Arturo Mercado Jr.', url_video: 'https://www.youtube.com/watch?v=kJQP7kiw5Fk', rareza: 'Raro', version: 'Saludo clásico' },
      { id: 'dis_elsa_1', universo: 'Disney', personaje: 'Elsa', actor_de_doblaje: 'Carmen Sarahí', url_video: 'https://www.youtube.com/watch?v=RgKAFK5djSk', rareza: 'Épico', version: 'Versión invierno' },
      { id: 'dis_buzz_1', universo: 'Disney', personaje: 'Buzz Lightyear', actor_de_doblaje: 'José Luis Orozco', url_video: 'https://www.youtube.com/watch?v=OPf0YbXqDm0', rareza: 'Común', version: 'Versión espacial' },
      { id: 'nar_naruto_1', universo: 'Naruto', personaje: 'Naruto Uzumaki', actor_de_doblaje: 'Isabel Martiñón', url_video: 'https://www.youtube.com/watch?v=fJ9rUzIMcZQ', rareza: 'Legendario', version: 'Dattebayo' },
      { id: 'nar_sasuke_1', universo: 'Naruto', personaje: 'Sasuke Uchiha', actor_de_doblaje: 'Javier Olguín', url_video: 'https://www.youtube.com/watch?v=eY52Zsg-KVI', rareza: 'Raro', version: 'Versión seria' },
      { id: 'nar_sakura_1', universo: 'Naruto', personaje: 'Sakura Haruno', actor_de_doblaje: 'Leyla Rangel', url_video: 'https://www.youtube.com/watch?v=60ItHLz5WEA', rareza: 'Común', version: 'Versión alegre' }
    ];

    const state = {
      view: 'map',
      universe: null,
      filters: { personaje: 'todos', actor: 'todos', rareza: 'todos' },
      selectedVideoId: null,
      marathon: { active: false, queue: [], position: 0 }
    };

    const tabMap = document.getElementById('tabMap');
    const tabAchievements = document.getElementById('tabAchievements');
    const viewMap = document.getElementById('viewMap');
    const viewUniverse = document.getElementById('viewUniverse');
    const viewAchievements = document.getElementById('viewAchievements');

    function rarityClass(rareza) {
      return `rare-${rareza.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')}`;
    }

    function toEmbedUrl(url, autoplay = 0) {
      const match = url.match(/(?:v=|\.be\/)([A-Za-z0-9_-]{11})/);
      const id = match ? match[1] : '';
      return `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&autoplay=${autoplay}&enablejsapi=1`;
    }

    function groupByUniverse() {
      return VIDEOS.reduce((acc, item) => {
        acc[item.universo] = acc[item.universo] || [];
        acc[item.universo].push(item);
        return acc;
      }, {});
    }

    function getUniverseVideos() {
      return VIDEOS.filter(v => v.universo === state.universe);
    }

    function getFilteredUniverseVideos() {
      return getUniverseVideos().filter(v => {
        const m1 = state.filters.personaje === 'todos' || v.personaje === state.filters.personaje;
        const m2 = state.filters.actor === 'todos' || v.actor_de_doblaje === state.filters.actor;
        const m3 = state.filters.rareza === 'todos' || v.rareza === state.filters.rareza;
        return m1 && m2 && m3;
      });
    }

    function getCharactersIndex(videos) {
      const grouped = videos.reduce((acc, v) => {
        acc[v.personaje] = acc[v.personaje] || [];
        acc[v.personaje].push(v);
        return acc;
      }, {});
      return Object.entries(grouped).map(([personaje, versions]) => ({ personaje, versions }));
    }

    function renderMapView() {
      const universes = groupByUniverse();
      const cards = Object.entries(universes).map(([name, videos]) => `
        <article class="card">
          <h2 class="universe-name">${name}</h2>
          <p class="muted">${videos.length} videos en colección</p>
          <div class="actions">
            <button data-open="${name}">Abrir universo</button>
          </div>
        </article>
      `).join('');

      viewMap.innerHTML = `<div class="grid">${cards}</div>`;
      viewMap.querySelectorAll('button[data-open]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.universe = btn.dataset.open;
          state.selectedVideoId = null;
          state.marathon = { active: false, queue: [], position: 0 };
          state.filters = { personaje: 'todos', actor: 'todos', rareza: 'todos' };
          changeView('universe');
        });
      });
    }

    function renderUniverseView() {
      const videos = getUniverseVideos();
      if (!videos.length) return;

      const personajes = [...new Set(videos.map(v => v.personaje))];
      const actores = [...new Set(videos.map(v => v.actor_de_doblaje))];
      const rarezas = ['Común', 'Raro', 'Épico', 'Legendario'];
      const filtered = getFilteredUniverseVideos();
      const groupedCharacters = getCharactersIndex(filtered);
      const selected = filtered.find(v => v.id === state.selectedVideoId) || filtered[0];

      const videoCards = groupedCharacters.map(group => {
        const top = group.versions[0];
        const versionsMarkup = group.versions.map(v => `
          <button data-play="${v.id}">▶ ${v.version || 'Versión base'} · ${v.actor_de_doblaje}</button>
        `).join('');

        return `
          <article class="card video-card" id="char-${cssSafe(group.personaje)}">
            <h3>${group.personaje}</h3>
            <p>Actor base: ${top.actor_de_doblaje}</p>
            <span class="badge ${rarityClass(top.rareza)}">${top.rareza}</span>
            <details>
              <summary>Ver versiones (${group.versions.length})</summary>
              <div class="version-list">${versionsMarkup}</div>
            </details>
          </article>
        `;
      }).join('');

      const indexRows = getCharactersIndex(videos).map(group => `
        <div class="index-row">
          <span>${group.personaje}</span>
          <button data-jump="${cssSafe(group.personaje)}">${group.versions.length} versiones</button>
        </div>
      `).join('');

      const marathonText = state.marathon.active
        ? `Reproduciendo ${state.marathon.position + 1} de ${state.marathon.queue.length}`
        : 'Modo Maratón desactivado';

      viewUniverse.innerHTML = `
        <div class="actions">
          <button id="backMap">← Volver al mapa</button>
          <button id="startMarathon">Modo Maratón</button>
        </div>
        <h2>${state.universe}</h2>
        <p class="muted">${videos.length} videos cargados en este universo.</p>

        <div class="universe-layout">
          <section class="panel">
            <div class="toolbar">
              <label>Personaje
                <select id="filterCharacter">
                  <option value="todos">Todos</option>
                  ${personajes.map(p => `<option value="${p}" ${state.filters.personaje === p ? 'selected' : ''}>${p}</option>`).join('')}
                </select>
              </label>
              <label>Actor de doblaje
                <select id="filterActor">
                  <option value="todos">Todos</option>
                  ${actores.map(a => `<option value="${a}" ${state.filters.actor === a ? 'selected' : ''}>${a}</option>`).join('')}
                </select>
              </label>
              <label>Rareza
                <select id="filterRarity">
                  <option value="todos">Todas</option>
                  ${rarezas.map(r => `<option value="${r}" ${state.filters.rareza === r ? 'selected' : ''}>${r}</option>`).join('')}
                </select>
              </label>
              <button id="clearFilters">Limpiar filtros</button>
            </div>

            <div class="video-grid">${videoCards || '<p class="muted">No hay resultados con estos filtros.</p>'}</div>

            <div class="player-box">
              ${selected ? `<iframe id="videoPlayer" src="${toEmbedUrl(selected.url_video, 1)}" title="Reproductor" allow="autoplay; encrypted-media" allowfullscreen></iframe>` : '<p class="muted">Sin video seleccionado</p>'}
            </div>
            <div class="marathon" id="marathonState">${marathonText}</div>
          </section>

          <aside class="panel">
            <h3>Índice del universo</h3>
            <p class="muted">Navega rápido por personaje y cantidad de versiones.</p>
            <div class="index-list">${indexRows}</div>
          </aside>
        </div>
      `;

      document.getElementById('backMap').onclick = () => changeView('map');
      document.getElementById('startMarathon').onclick = startMarathon;
      document.getElementById('clearFilters').onclick = () => {
        state.filters = { personaje: 'todos', actor: 'todos', rareza: 'todos' };
        state.marathon = { active: false, queue: [], position: 0 };
        renderUniverseView();
      };

      document.getElementById('filterCharacter').onchange = (e) => { state.filters.personaje = e.target.value; state.marathon.active = false; renderUniverseView(); };
      document.getElementById('filterActor').onchange = (e) => { state.filters.actor = e.target.value; state.marathon.active = false; renderUniverseView(); };
      document.getElementById('filterRarity').onchange = (e) => { state.filters.rareza = e.target.value; state.marathon.active = false; renderUniverseView(); };

      viewUniverse.querySelectorAll('button[data-play]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedVideoId = btn.dataset.play;
          state.marathon.active = false;
          renderUniverseView();
        });
      });

      viewUniverse.querySelectorAll('button[data-jump]').forEach(btn => {
        btn.addEventListener('click', () => {
          document.getElementById(`char-${btn.dataset.jump}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
      });

      attachPlayerEndedHandler();
    }

    function renderAchievementsView() {
      const universeMap = groupByUniverse();
      const universeCompleted = Object.values(universeMap).some(list => {
        const uniq = new Set(list.map(v => v.personaje)).size;
        return uniq >= 3;
      });
      const tenSameUniverse = Object.values(universeMap).some(list => new Set(list.map(v => v.personaje)).size >= 10);
      const fiveLegendary = VIDEOS.filter(v => v.rareza === 'Legendario').length >= 5;

      const achievements = [
        {
          title: 'Primer universo completado',
          description: 'Tener al menos 3 personajes distintos en un universo.',
          unlocked: universeCompleted
        },
        {
          title: '10 personajes de un mismo universo',
          description: 'Completa 10 personajes únicos dentro de un universo.',
          unlocked: tenSameUniverse
        },
        {
          title: '5 videos legendarios',
          description: 'Consigue 5 videos con rareza Legendario.',
          unlocked: fiveLegendary
        }
      ];

      viewAchievements.innerHTML = `
        <div class="panel achievements">
          ${achievements.map(a => `
            <article class="achievement ${a.unlocked ? 'done' : ''}">
              <h3>${a.unlocked ? '✅' : '🔒'} ${a.title}</h3>
              <p class="muted">${a.description}</p>
              <p>${a.unlocked ? 'Desbloqueado' : 'Pendiente'}</p>
            </article>
          `).join('')}
        </div>
      `;
    }

    function cssSafe(text) {
      return text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-');
    }

    function startMarathon() {
      const queue = getFilteredUniverseVideos();
      if (!queue.length) return;
      state.marathon.active = true;
      state.marathon.queue = queue;
      state.marathon.position = 0;
      state.selectedVideoId = queue[0].id;
      renderUniverseView();
      updateMarathonLabel();
    }

    function nextInMarathon() {
      if (!state.marathon.active) return;
      if (state.marathon.position >= state.marathon.queue.length - 1) {
        state.marathon.active = false;
        updateMarathonLabel('Maratón finalizado.');
        return;
      }
      state.marathon.position += 1;
      const current = state.marathon.queue[state.marathon.position];
      state.selectedVideoId = current.id;
      renderUniverseView();
      updateMarathonLabel();
    }

    function updateMarathonLabel(override) {
      const el = document.getElementById('marathonState');
      if (!el) return;
      if (override) {
        el.textContent = override;
        return;
      }
      if (state.marathon.active) {
        el.textContent = `Reproduciendo ${state.marathon.position + 1} de ${state.marathon.queue.length}`;
      } else {
        el.textContent = 'Modo Maratón desactivado';
      }
    }

    function attachPlayerEndedHandler() {
      const iframe = document.getElementById('videoPlayer');
      if (!iframe) return;
      const currentUrl = new URL(iframe.src);
      const videoId = currentUrl.pathname.split('/').pop();

      // Fallback simple: avanza cada 12s en modo maratón si no se puede captar evento "ended" del reproductor embebido.
      // Esto mantiene la reproducción encadenada sin interacción adicional tras activar maratón.
      clearTimeout(window.__marathonFallback);
      if (state.marathon.active && videoId) {
        window.__marathonFallback = setTimeout(nextInMarathon, 12000);
      }
    }

    function changeView(next) {
      state.view = next;
      viewMap.classList.toggle('active', next === 'map');
      viewUniverse.classList.toggle('active', next === 'universe');
      viewAchievements.classList.toggle('active', next === 'achievements');
      tabMap.classList.toggle('active', next !== 'achievements');
      tabAchievements.classList.toggle('active', next === 'achievements');

      if (next === 'map') renderMapView();
      if (next === 'universe') renderUniverseView();
      if (next === 'achievements') renderAchievementsView();
    }

    tabMap.onclick = () => changeView(state.universe ? 'universe' : 'map');
    tabAchievements.onclick = () => changeView('achievements');

    changeView('map');
  </script>
</body>
</html>
